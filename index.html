<html lang="en">
<head>

    <title>TradingView Chart</title>
</head>
<body>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({
            container_id: "tradingview_widget",
            width: 980,
            height: 610,
            symbol: "NASDAQ:AAPL",
            interval: "D",
            timezone: "Etc/UTC",
            theme: "light",
            style: "1",

            toolbar_bg: "#f1f3f6",

            hide_top_toolbar: false,
            save_image: false,
            studies: [],

            popup_width: "1000",
            popup_height: "650"
